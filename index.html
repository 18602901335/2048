<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="2048">
    <meta name="theme-color" content="#faf8ef">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23edc22e'/><text x='50' y='65' text-anchor='middle' font-size='50' font-weight='bold' fill='%23f9f6f2' font-family='Arial'>2048</text></svg>">
    <title>2048</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="title-row">
                <h1 class="logo">2048</h1>
                <div class="scores">
                    <div class="score-box">
                        <span class="score-label">分数</span>
                        <span class="score-value" id="score">0</span>
                    </div>
                    <div class="score-box">
                        <span class="score-label">最高分</span>
                        <span class="score-value" id="best-score">0</span>
                    </div>
                </div>
            </div>
            <div class="controls">
                <button class="btn btn-ctrl" id="btn-undo" title="撤销 (最多10步)">撤销</button>
                <button class="btn btn-ctrl" id="btn-new-game">新游戏</button>
                <button class="btn btn-ctrl" id="btn-settings" title="设置">设置</button>
            </div>
        </header>

        <!-- Game Board -->
        <div class="game-wrapper">
            <div class="game-board" id="game-board"></div>
        </div>

        <!-- Grid Size Selector -->
        <div class="size-selector">
            <span class="size-label">网格</span>
            <button class="size-btn" data-size="3">3×3</button>
            <button class="size-btn active" data-size="4">4×4</button>
            <button class="size-btn" data-size="5">5×5</button>
            <button class="size-btn" data-size="6">6×6</button>
        </div>

        <!-- Hint -->
        <p class="hint">滑动屏幕或使用方向键操作</p>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-overlay">
        <div class="modal">
            <h2 class="modal-title">设置</h2>
            <div class="setting-group">
                <label class="setting-label">主题配色</label>
                <div class="setting-options" id="theme-options">
                    <button class="opt-btn active" data-theme="classic">经典</button>
                    <button class="opt-btn" data-theme="dark">深色</button>
                    <button class="opt-btn" data-theme="macaron">马卡龙</button>
                </div>
            </div>
            <div class="setting-group">
                <label class="setting-label">音效方案</label>
                <div class="setting-options" id="sound-options">
                    <button class="opt-btn active" data-sound="crisp">清脆</button>
                    <button class="opt-btn" data-sound="soft">柔和</button>
                    <button class="opt-btn" data-sound="muted">静音</button>
                </div>
            </div>
            <button class="btn btn-primary btn-close" id="btn-close-settings">关闭</button>
        </div>
    </div>

    <!-- Game Over / Win Overlay -->
    <div class="modal-overlay" id="game-overlay" style="display:none">
        <div class="modal modal-sm">
            <p class="overlay-text" id="overlay-text"></p>
            <div class="overlay-buttons">
                <button class="btn btn-primary" id="btn-overlay-action">再来一局</button>
                <button class="btn btn-secondary" id="btn-overlay-continue" style="display:none">继续游戏</button>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/app.js"></script>

    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
